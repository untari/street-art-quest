<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nice find! — Street Art Quest</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    body { overflow: auto; min-height: 100vh; }

    .thankyou-page {
      max-width: 480px;
      margin: 0 auto;
      padding: 80px 24px 60px;
      text-align: center;
    }

    .thankyou-emoji {
      font-size: 56px;
      margin-bottom: 20px;
      display: block;
    }

    .thankyou-page h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: 12px;
      color: var(--dark);
    }

    .thankyou-page h1 span { color: var(--teal); }

    .thankyou-page p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      font-weight: 600;
      margin-bottom: 36px;
    }

    .thankyou-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .btn-primary {
      display: inline-block;
      background: var(--teal);
      color: #fff;
      padding: 14px 32px;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(46,196,182,0.4);
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }

    .btn-secondary {
      display: inline-block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: color 0.15s;
    }

    .btn-secondary:hover { color: var(--dark); }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">STREET ART <span>QUEST</span></a>
  </header>

  <div class="thankyou-page">
    <span class="thankyou-emoji">🎉</span>
    <h1>Nice <span>find!</span></h1>
    <p>
      Your submission is in. We'll review it and add it to the map usually within a few days.
      Keep exploring while you wait.
    </p>
    <div class="thankyou-actions">
      <a href="index.html" class="btn-primary">Back to the map</a>
      <a href="submit.html" class="btn-secondary">Submit another artwork</a>
    </div>
  </div>
</body>
</html>
