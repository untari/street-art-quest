<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Street Art Quest — Sheung Wan</title>
  <meta name="description" content="Hunt down street art and murals hidden across Sheung Wan, Hong Kong." />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <div class="logo">STREET ART <span>QUEST</span></div>
    <div class="filters">
      <button class="filter-btn active" data-type="all">All</button>
      <button class="filter-btn" data-type="Mural">Mural</button>
      <button class="filter-btn" data-type="Sculpture">Sculpture</button>
      <button class="filter-btn" data-type="Paste-up">Paste-up</button>
      <button class="filter-btn" data-type="Sticker">Sticker</button>
      <button class="filter-btn" data-type="Installation">Installation</button>
    </div>
    <button class="quest-nav-btn" id="open-quests">QUESTS <span id="quest-nav-score">0/5</span></button>
    <a href="submit.html" class="add-btn">+ Add Art</a>
  </header>

  <div id="map"></div>

  <div id="panel" class="panel">
    <button id="close-panel" class="panel-close">×</button>
    <div id="panel-content"></div>
  </div>

  <div id="quest-panel" class="quest-panel">
    <div class="quest-panel-header">
      <span class="quest-panel-title">QUESTS</span>
      <span id="quest-panel-score" class="quest-panel-score">0 / 5</span>
      <button id="close-quest-panel" class="quest-panel-close">×</button>
    </div>
    <div id="quest-list" class="quest-list"></div>
  </div>

  <div id="quest-backdrop" class="quest-backdrop hidden"></div>

  <div id="quest-card" class="quest-card hidden">
    <button id="close-quest-card" class="quest-card-close">×</button>
    <div id="quest-card-content"></div>
  </div>

  <div class="count-bar">
    <span id="count">Loading…</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
