<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Art — Street Art Quest</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    body { overflow: auto; min-height: 100vh; }

    .submit-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 24px 60px;
    }

    .submit-page h1,
    .submit-page p.sub,
    .back-link {
      max-width: 620px;
    }

    .submit-page h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 0.08em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .submit-page p.sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .back-link {
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.08em;
      margin-bottom: 32px;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--dark); }

    .tally-wrap {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .tally-wrap iframe {
      display: block;
      width: 100%;
      min-height: 800px;
      border: none;
    }

    /* shown until TALLY_FORM_ID is set */
    .setup-notice {
      padding: 48px 28px;
      text-align: center;
    }

    .setup-notice .icon { font-size: 40px; margin-bottom: 16px; }

    .setup-notice h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .setup-notice ol {
      text-align: left;
      display: inline-block;
      font-size: 13px;
      color: var(--muted);
      line-height: 2;
      margin-bottom: 16px;
    }

    .setup-notice code {
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--dark);
    }

    .setup-notice p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">STREET ART <span>QUEST</span></a>
  </header>

  <div class="submit-page">
    <a href="index.html" class="back-link">← Back to map</a>
    <h1>Add an artwork</h1>
    <p class="sub">Spotted something? Take a photo, drop a pin, and submit. It'll be reviewed before it appears on the map.</p>

    <div class="tally-wrap" id="tally-wrap"></div>
  </div>

  <script>
    // ─── SETUP ────────────────────────────────────────────────────────────────
    // 1. Go to https://tally.so and create a free account
    // 2. Build your form (photo upload, art name, artist, location, label)
    // 3. Click Share → Embed → copy the form ID from the embed code
    //    It looks like: <iframe src="https://tally.so/embed/XXXXXX" ...>
    // 4. Paste just the ID (e.g. "wMdKLz") below:
    const TALLY_FORM_ID = 'LZy4q2';

    const wrap = document.getElementById('tally-wrap');

    if (TALLY_FORM_ID) {
      wrap.innerHTML = `
        <iframe
          id="tally-iframe"
          src="https://tally.so/embed/${TALLY_FORM_ID}?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
          loading="lazy"
          width="100%"
          height="800"
          title="Submit an artwork"
          frameborder="0"
          marginheight="0"
          marginwidth="0"
        ></iframe>
      `;
      // Tally's script auto-resizes the iframe via dynamicHeight
      const s = document.createElement('script');
      s.src = 'https://tally.so/widgets/embed.js';
      document.body.appendChild(s);
    } else {
      wrap.innerHTML = `
        <div class="setup-notice">
          <div class="icon">🗺️</div>
          <h2>One-time setup needed</h2>
          <ol>
            <li>Go to <strong>tally.so</strong> and create a free account</li>
            <li>Build your form — photo, art name, artist, location, label</li>
            <li>Click <strong>Share → Embed</strong> and copy the form ID</li>
            <li>Paste the ID into <code>TALLY_FORM_ID</code> in <code>submit.html</code></li>
          </ol>
          <p>Free forever · No account needed to submit · File uploads included</p>
        </div>
      `;
    }
  </script>
</body>
</html>
